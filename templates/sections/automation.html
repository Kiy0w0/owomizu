<section id="automation" class="content-section">
    <div class="section-header">
        <h1 class="section-title">
            <i class="fas fa-robot"></i>
            Automation Settings
        </h1>
        <div class="section-actions">
            <span class="nav-badge">New</span>
        </div>
    </div>

    <div class="action-grid" style="margin-bottom: var(--spacing-2xl);">
        <div class="action-card">
            <div class="action-header">
                <h3>New Features (v1.8.0)</h3>
                <p>Toggle the latest automation features</p>
            </div>
            <div class="toggle-grid">
                <div class="toggle-item">
                    <label class="toggle-switch">
                        <input type="checkbox" id="army-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                    <div class="toggle-info">
                        <span class="toggle-label">
                            <i class="fas fa-shield-alt"></i>
                            Army
                        </span>
                        <small class="toggle-description">Daily army farming command</small>
                    </div>
                </div>
                <div class="toggle-item">
                    <label class="toggle-switch">
                        <input type="checkbox" id="mail-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                    <div class="toggle-info">
                        <span class="toggle-label">
                            <i class="fas fa-envelope"></i>
                            Mail
                        </span>
                        <small class="toggle-description">Auto-claim mailbox rewards</small>
                    </div>
                </div>
                <div class="toggle-item">
                    <label class="toggle-switch">
                        <input type="checkbox" id="pup-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                    <div class="toggle-info">
                        <span class="toggle-label">
                            <i class="fas fa-dog"></i>
                            Pup
                        </span>
                        <small class="toggle-description">Pup daily farmer (shares Pupiku cog)</small>
                    </div>
                </div>
                <div class="toggle-item">
                    <label class="toggle-switch">
                        <input type="checkbox" id="piku-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                    <div class="toggle-info">
                        <span class="toggle-label">
                            <i class="fas fa-cat"></i>
                            Piku
                        </span>
                        <small class="toggle-description">Piku daily farmer (shares Pupiku cog)</small>
                    </div>
                </div>
                <div class="toggle-item">
                    <label class="toggle-switch">
                        <input type="checkbox" id="huntbot-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                    <div class="toggle-info">
                        <span class="toggle-label">
                            <i class="fas fa-robot"></i>
                            Huntbot
                        </span>
                        <small class="toggle-description">Greedy allocator auto-huntbot</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="settings-container">

    </div>
</section>
